# DockDocs self-hosted conversion engine.
# Gotenberg (Chromium + LibreOffice) behind Caddy (auto-HTTPS + shared-secret auth).
# Drives Office->PDF / html->PDF / url->PDF / PDF/A marginal cost to ~$0.
# Full provisioning guide: ./README.md
# 2026-06-15 redeploy (v2): force-recreate so Caddy reloads the /reverse route and the
# reverse (pdf->docx/xlsx) container comes up — box was still on the pre-reverse build,
# and a plain `up -d` won't restart Caddy when only the mounted Caddyfile changed.
services:
  gotenberg:
    build: .                       # ./Dockerfile = gotenberg/gotenberg:8 + Liberation/Noto/Carlito fonts
    restart: unless-stopped
    command:
      - gotenberg
      - --api-timeout=120s         # allow big/complex documents
      - --libreoffice-restart-after=10   # contain LibreOffice memory growth
      - --chromium-restart-after=10      # contain Chromium url-route memory leak
      # SSRF defence: block Chromium from fetching cloud metadata IPs and RFC-1918
      # ranges that HTML payloads could embed (e.g. <img src="http://100.100.100.200/...">).
      # This flag REPLACES Gotenberg's default (^file:///[^/]+), so the file:// pattern
      # is retained here explicitly.  Regex alternatives (| = OR):
      #   ^file:///[^/]+            — default: block file:// URIs with a host component
      #   169.254.*                 — link-local / AWS + Aliyun metadata (169.254.169.254)
      #   100.100.100.200           — Aliyun instance metadata endpoint
      #   127.*                     — loopback
      #   10.*  172.16-31.*  192.168.*  — RFC-1918 private ranges
      - '--chromium-deny-list=^file:///[^/]+|^https?://(169\.254\.|100\.100\.100\.200|127\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)'
    expose:
      - "3000"                     # internal only — never published to the internet directly
    networks: [edge]

  reverse:
    build: ./reverse               # FastAPI pdf2docx + pdfplumber (PDF → DOCX/XLSX)
    restart: unless-stopped
    expose:
      - "4000"                     # internal only
    environment:
      DOCKDOCS_REVERSE_SECRET: ${GOTENBERG_SECRET}   # reuse same shared secret
    networks: [edge]

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [gotenberg, reverse]
    ports:
      - "80:80"
      - "443:443"
    env_file: .env                 # GOTENBERG_DOMAIN, GOTENBERG_SECRET
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

networks:
  edge: {}
volumes:
  caddy_data: {}
  caddy_config: {}
