# ── Security headers (applied to every response) ──
[[headers]]
  for = "/*"
  [headers.values]
    # Allow JSON-LD inline scripts (dangerouslySetInnerHTML in Next page.tsx files)
    # and the Umami analytics snippet (analytics.dockdocs.app).
    # 'unsafe-inline' is required for JSON-LD; tighten to nonces when Next supports it.
    # script-src: ONLY self + inline (JSON-LD) + our self-hosted umami. We use no
    # third-party trackers (GTM/Clarity/GA) — the privacy policy says so; the CSP
    # must not whitelist trackers we don't use.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.dockdocs.app; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; object-src 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[build]
  command = "npm run build"
  publish = "out"
  # Override Netlify's monorepo auto-skip (base dir = apps/dockdocs): the app
  # imports shared/templates/* from the repo root, so shared-only commits MUST
  # build too (2026-07-02: two shared-only deploys were auto-canceled and had to
  # be triggered by hand). cwd here is the base dir; ../../ = repo root.
  # git diff --quiet exits 0 when nothing changed → build is skipped.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../../shared ../../package-lock.json ../../package.json"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── 301s: the two bundled batch tools were split into per-format tools (2026-06) ──
# batch-pdf-to-office (PDF→Word/Excel) → batch-pdf-to-word ; batch-office-to-pdf (Office→PDF) → batch-word-to-pdf
[[redirects]]
  from = "/batch-pdf-to-office/*"
  to = "/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/zh/batch-pdf-to-office/*"
  to = "/zh/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/es/batch-pdf-to-office/*"
  to = "/es/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/pt/batch-pdf-to-office/*"
  to = "/pt/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/fr/batch-pdf-to-office/*"
  to = "/fr/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/batch-office-to-pdf/*"
  to = "/batch-word-to-pdf/"
  status = 301
[[redirects]]
  from = "/zh/batch-office-to-pdf/*"
  to = "/zh/batch-word-to-pdf/"
  status = 301
[[redirects]]
  from = "/es/batch-office-to-pdf/*"
  to = "/es/batch-word-to-pdf/"
  status = 301
[[redirects]]
