[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── 301s: the two bundled batch tools were split into per-format tools (2026-06) ──
# batch-pdf-to-office (PDF→Word/Excel) → batch-pdf-to-word ; batch-office-to-pdf (Office→PDF) → batch-word-to-pdf
[[redirects]]
  from = "/batch-pdf-to-office/*"
  to = "/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/zh/batch-pdf-to-office/*"
  to = "/zh/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/es/batch-pdf-to-office/*"
  to = "/es/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/pt/batch-pdf-to-office/*"
  to = "/pt/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/fr/batch-pdf-to-office/*"
  to = "/fr/batch-pdf-to-word/"
  status = 301
[[redirects]]
  from = "/batch-office-to-pdf/*"
  to = "/batch-word-to-pdf/"
  status = 301
[[redirects]]
  from = "/zh/batch-office-to-pdf/*"
  to = "/zh/batch-word-to-pdf/"
  status = 301
[[redirects]]
  from = "/es/batch-office-to-pdf/*"
  to = "/es/batch-word-to-pdf/"
  status = 301
[[redirects]]
  from = "/pt/batch-office-to-pdf/*"
  to = "/pt/batch-word-to-pdf/"
  status = 301
[[redirects]]
  from = "/fr/batch-office-to-pdf/*"
  to = "/fr/batch-word-to-pdf/"
  status = 301

# ── /ja/ noindex: tool pages fall back to English (POC locale, not yet translated) ──
# Remove once /ja/ tool pages are fully localized with native Japanese content.
[[headers]]
  for = "/ja/*"
  [headers.values]
    X-Robots-Tag = "noindex, follow"
